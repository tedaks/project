{% extends "sensors/base.html" %}

{% block title %}Sensor Dashboard — Live Monitoring{% endblock %}

{% block content %}
<!-- Stats Cards Section -->
<section class="mb-8">
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-slate-800 dark:text-slate-300">Sensor Statistics</h2>
        <span class="htmx-indicator text-xs text-indigo-600 dark:text-indigo-400">
            <svg class="w-4 h-4 inline animate-spin" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
            </svg>
            Refreshing…
        </span>
    </div>
    <div id="stats-cards" hx-get="{% url 'stats_cards' %}" hx-trigger="load, every 5s"
        hx-swap="innerHTML transition:true" hx-indicator=".htmx-indicator">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            {% for i in "123" %}
            <div
                class="rounded-xl border border-slate-200 bg-white dark:border-slate-800/60 dark:bg-slate-900/50 p-6 animate-pulse transition-colors duration-200">
                <div class="h-4 bg-slate-200 dark:bg-slate-800 rounded w-24 mb-3"></div>
                <div class="h-8 bg-slate-200 dark:bg-slate-800 rounded w-16"></div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>

<!-- Readings Table Section -->
<section>
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-slate-800 dark:text-slate-300">Recent Readings</h2>
        <div class="flex items-center gap-3">
            <!-- Sensor filter buttons — active state tracked via JS -->
            <div id="filter-group"
                class="flex rounded-lg border border-slate-300 dark:border-slate-700/60 overflow-hidden text-sm transition-colors duration-200 shadow-sm dark:shadow-none">
                <button data-filter="" hx-get="{% url 'sensor_table' %}" hx-target="#sensor-table"
                    hx-swap="outerHTML transition:true"
                    class="filter-btn active-filter px-3 py-1.5 font-medium transition-colors">
                    All
                </button>
                <button data-filter="temperature" hx-get="{% url 'sensor_table' %}?sensor=temperature"
                    hx-target="#sensor-table" hx-swap="outerHTML transition:true"
                    class="filter-btn px-3 py-1.5 border-l border-slate-300 dark:border-slate-700/60 font-medium transition-colors">
                    🌡️ Temp
                </button>
                <button data-filter="humidity" hx-get="{% url 'sensor_table' %}?sensor=humidity"
                    hx-target="#sensor-table" hx-swap="outerHTML transition:true"
                    class="filter-btn px-3 py-1.5 border-l border-slate-300 dark:border-slate-700/60 font-medium transition-colors">
                    💧 Humidity
                </button>
                <button data-filter="pressure" hx-get="{% url 'sensor_table' %}?sensor=pressure"
                    hx-target="#sensor-table" hx-swap="outerHTML transition:true"
                    class="filter-btn px-3 py-1.5 border-l border-slate-300 dark:border-slate-700/60 font-medium transition-colors">
                    🔵 Pressure
                </button>
            </div>
        </div>
    </div>
    <div id="sensor-table" hx-get="{% url 'sensor_table' %}" hx-trigger="load" hx-swap="outerHTML transition:true">
        <!-- Skeleton loader -->
        <div
            class="rounded-xl border border-slate-200 bg-white dark:border-slate-800/60 dark:bg-slate-900/50 overflow-hidden transition-colors duration-200 shadow-sm dark:shadow-none">
            <div class="p-4 space-y-3">
                {% for i in "12345" %}
                <div class="flex gap-4 animate-pulse">
                    <div class="h-4 bg-slate-200 dark:bg-slate-800 rounded w-28"></div>
                    <div class="h-4 bg-slate-200 dark:bg-slate-800 rounded w-16"></div>
                    <div class="h-4 bg-slate-200 dark:bg-slate-800 rounded w-40 ml-auto"></div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</section>

<style>
    .filter-btn {
        color: rgb(71 85 105);
        /* slate-600 */
        background: white;
    }

    .dark .filter-btn {
        color: rgb(148 163 184);
        /* slate-400 */
        background: rgb(30 41 59 / 0.5);
        /* slate-800/50 */
    }

    .filter-btn:hover {
        background: rgb(241 245 249);
        /* slate-50 */
    }

    .dark .filter-btn:hover {
        background: rgb(51 65 85);
        /* slate-700 */
    }

    .filter-btn.active-filter {
        background: rgb(100 116 139);
        /* slate-500 */
        color: white;
    }

    .dark .filter-btn.active-filter {
        background: rgb(99 102 241);
        /* indigo-500 */
        color: white;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const filterGroup = document.getElementById('filter-group');
        if (!filterGroup) return;

        filterGroup.addEventListener('htmx:beforeRequest', (e) => {
            // When a filter button fires an HTMX request, update active state
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;
            filterGroup.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-filter'));
            btn.classList.add('active-filter');
        });
    });
</script>
{% endblock %}

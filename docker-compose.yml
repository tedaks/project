services:
  timescaledb:
    image: timescale/timescaledb:2.25.2-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      LANG: C
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
      AUTH_TYPE: scram-sha-256
      LISTEN_PORT: 6432
    networks:
      - backend
    healthcheck:
      # M3: probe the actual port so we only mark healthy when PgBouncer is
      # accepting connections, not just when its process exists.
      test: [ "CMD-SHELL", "nc -z 127.0.0.1 6432 || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    # M4: password passed via config file rather than CLI arg to avoid
    # leaking the secret through `ps aux` / `docker inspect` process lists.
    command: [ "redis-server", "/etc/redis/redis.conf" ]
    volumes:
      - redis_data:/data
      - ./redis.conf:/etc/redis/redis.conf:ro
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      API_KEY: ${API_KEY}
      DEBUG: ${DEBUG:-0}
      # H1: pass origin via env so production deployments set CORS_ORIGIN=https://your-domain.com
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8000}
    ports:
      - "127.0.0.1:8001:8001"
    networks:
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')\"" ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FASTAPI_URL: http://api:8001
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-0}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      API_KEY: ${API_KEY}
      ENABLE_MUTATIONS: ${ENABLE_MUTATIONS:-0}
    ports:
      - "8000:8000"
    networks:
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\"" ]
      interval: 15s
      timeout: 5s
      retries: 5

networks:
  backend:
    driver: bridge

volumes:
  timescaledb_data:
  redis_data:
